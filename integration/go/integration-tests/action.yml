name: Go Integration Tests
description: Download the built artifact and run integration tests

inputs:
  setup:
    description: Tool setup method (bash, mise, node, just, none)
    required: false
    default: bash
  node-version:
    description: Node.js version (used when setup=node)
    required: false
    default: "20"
  app-name:
    description: Application name; used in artifact names
    required: true
  integration-task:
    description: Task to run
    required: false
    default: test:integration
  env:
    description: >
      Environment variables to pass to the test process, one KEY=VALUE per line.
      Example:
        DATABASE_URL=postgres://postgres:test@localhost:5432/test
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
    - if: inputs.setup == 'mise'
      uses: jdx/mise-action@v2
    - if: inputs.setup == 'node'
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
    - if: inputs.setup == 'just'
      uses: elpic/actions/utilities/setup-just@v1
    - uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.app-name }}-binaries
    - name: Export environment variables
      if: inputs.env != ''
      shell: bash
      run: |
        echo "${{ inputs.env }}" | while IFS= read -r line; do
          if [ -n "$line" ]; then
            echo "$line" >> "$GITHUB_ENV"
          fi
        done
    - shell: bash
      run: |
        chmod +x ${{ inputs.app-name }}-*
        case "${{ inputs.setup }}" in
          bash|*) ${{ inputs.integration-task }} ;;
          mise) mise run ${{ inputs.integration-task }} ;;
          node) npm run ${{ inputs.integration-task }} ;;
          just) just ${{ inputs.integration-task }} ;;
        esac
