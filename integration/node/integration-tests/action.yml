name: Node Integration Tests
description: Download the built artifact and run integration tests

inputs:
  setup:
    description: Tool setup method (mise, node, just, none)
    required: false
    default: mise
  node-version:
    description: Node.js version (used when setup=node)
    required: false
    default: "20"
  integration-task:
    description: Task for integration tests
    required: false
    default: test:integration
  env:
    description: >
      Environment variables to pass to the test process, one KEY=VALUE per line.
      Example:
        DATABASE_URL=postgres://postgres:test@localhost:5432/test
    required: false
    default: ""
  app-name:
    description: Application name; used in artifact names
    required: true

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
    - uses: jdx/mise-action@v2
    - uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.app-name }}-build
    - name: Export environment variables
      if: inputs.env != ''
      shell: bash
      run: |
        echo "${{ inputs.env }}" | while IFS= read -r line; do
          if [ -n "$line" ]; then
            echo "$line" >> "$GITHUB_ENV"
          fi
        done
    - shell: bash
      run: |
        mise run ${{ inputs.integration-task }}
