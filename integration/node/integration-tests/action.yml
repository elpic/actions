name: Node Integration Tests
description: Download the built artifact and run integration tests

inputs:
  setup:
    description: Tool setup method (bash, mise, node, just, none)
    required: false
    default: bash
  node-version:
    description: Node.js version (used when setup=node)
    required: false
    default: "20"
  app-name:
    description: Application name; used in artifact names
    required: true
  integration-task:
    description: Task to run
    required: false
    default: test:integration
  env:
    description: >
      Environment variables to pass to the test process, one KEY=VALUE per line.
      Example:
        DATABASE_URL=postgres://postgres:test@localhost:5432/test
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
    - if: inputs.setup == 'mise'
      uses: jdx/mise-action@v2
    - if: inputs.setup == 'node'
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
    - if: inputs.setup == 'just'
      shell: bash
      run: |
        curl -fsSL https://github.com/casey/just/releases/latest/download/just-$(uname -m)-unknown-linux-musl.tar.gz | sudo tar xz -C /usr/local/bin just
    - uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.app-name }}-build
    - name: Export environment variables
      if: inputs.env != ''
      shell: bash
      run: |
        echo "${{ inputs.env }}" | while IFS= read -r line; do
          if [ -n "$line" ]; then
            echo "$line" >> "$GITHUB_ENV"
          fi
        done
    - if: inputs.setup == 'bash' || inputs.setup == ''
      shell: bash
      run: ${{ inputs.integration-task }}
    - if: inputs.setup == 'mise'
      shell: bash
      run: mise run ${{ inputs.integration-task }}
    - if: inputs.setup == 'node'
      shell: bash
      run: npm run ${{ inputs.integration-task }}
    - if: inputs.setup == 'just'
      shell: bash
      run: just ${{ inputs.integration-task }}
