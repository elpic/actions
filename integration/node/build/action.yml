name: Node Build
description: Build the Node.js project and upload it as an artifact

inputs:
  setup:
    description: Tool setup method (bash, mise, node, just, none)
    required: false
    default: bash
  node-version:
    description: Node.js version (used when setup=node)
    required: false
    default: "20"
  build-task:
    description: Task to run
    required: false
    default: build

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
    - if: inputs.setup == 'mise'
      uses: jdx/mise-action@v2
    - if: inputs.setup == 'node'
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
    - if: inputs.setup == 'just'
      shell: bash
      run: |
        curl -fsSL https://github.com/casey/just/releases/latest/download/just-$(uname -m)-unknown-linux-musl.tar.gz | sudo tar xz -C /usr/local/bin just
    - if: inputs.setup == 'bash' || inputs.setup == ''
      shell: bash
      run: ${{ inputs.build-task }}
    - if: inputs.setup == 'mise'
      shell: bash
      run: mise run ${{ inputs.build-task }}
    - if: inputs.setup == 'node'
      shell: bash
      run: npm run ${{ inputs.build-task }}
    - if: inputs.setup == 'just'
      shell: bash
      run: just ${{ inputs.build-task }}
