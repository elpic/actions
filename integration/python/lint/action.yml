name: Python Lint
description: Run the Python linter via mise

inputs:
  setup:
    description: Tool setup method (bash, mise, node, just, none)
    required: false
    default: bash
  node-version:
    description: Node.js version (used when setup=node)
    required: false
    default: "20"
  lint-task:
    description: Task to run
    required: false
    default: lint

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
    - if: inputs.setup == 'mise'
      uses: jdx/mise-action@v2
    - if: inputs.setup == 'node'
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
    - if: inputs.setup == 'just'
      uses: ./utilities/setup-just
    - if: inputs.setup == 'bash' || inputs.setup == ''
      shell: bash
      run: ${{ inputs.lint-task }}
    - if: inputs.setup == 'mise'
      shell: bash
      run: mise run ${{ inputs.lint-task }}
    - if: inputs.setup == 'node'
      shell: bash
      run: npm run ${{ inputs.lint-task }}
    - if: inputs.setup == 'just'
      shell: bash
      run: just ${{ inputs.lint-task }}
