name: "Build Tauri app"
description: "Runs frontend build, cargo check, clippy, and cargo test"

inputs:
  project-directory:
    description: "Directory containing the Tauri project (relative to workspace)"
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.project-directory }}
      run: npm ci

    - name: Type check
      shell: bash
      working-directory: ${{ inputs.project-directory }}
      run: npx tsc --noEmit

    - name: Build frontend
      shell: bash
      working-directory: ${{ inputs.project-directory }}
      run: npm run build

    - name: Cargo check
      shell: bash
      working-directory: ${{ inputs.project-directory }}/src-tauri
      run: cargo check

    - name: Cargo clippy
      shell: bash
      working-directory: ${{ inputs.project-directory }}/src-tauri
      run: cargo clippy -- -D warnings

    - name: Cargo test
      shell: bash
      working-directory: ${{ inputs.project-directory }}/src-tauri
      run: cargo test
