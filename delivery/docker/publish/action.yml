name: Docker Publish
description: Build, tag, and push a Docker image to a container registry

inputs:
  app-name:
    description: Application name; used in image tags
    required: true
  registry:
    description: Container registry URL (e.g. ghcr.io, docker.io, aws_account_id.dkr.ecr.region.amazonaws.com)
    required: true
  dockerfile:
    description: Path to the Dockerfile
    required: false
    default: Dockerfile
  build-context:
    description: Docker build context directory
    required: false
    default: .
  build-task:
    description: mise task for pre-build steps (optional)
    required: false
    default: ""
  additional-tags:
    description: Comma-separated list of additional tags to apply
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Pre-build steps
      if: inputs.build-task != ''
      shell: bash
      run: |
        mise run ${{ inputs.build-task }}

    - name: Generate tags
      id: tags
      uses: elpic/actions/utilities/generate-oci-tags@v1
      with:
        registry: ${{ inputs.registry }}
        image: ${{ inputs.app-name }}
        additional-tags: ${{ inputs.additional-tags }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.build-context }}
        file: ${{ inputs.dockerfile }}
        push: true
        tags: ${{ steps.tags.outputs.tags }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
