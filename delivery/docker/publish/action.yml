name: Docker Publish
description: Build, tag, and push a Docker image to a container registry

inputs:
  app-name:
    description: Application name; used in image tags
    required: true
  registry:
    description: Container registry URL (e.g. ghcr.io, docker.io, aws_account_id.dkr.ecr.region.amazonaws.com)
    required: true
  dockerfile:
    description: Path to the Dockerfile
    required: false
    default: Dockerfile
  build-context:
    description: Docker build context directory
    required: false
    default: .
  build-task:
    description: mise task for pre-build steps (optional)
    required: false
    default: ""
  additional-tags:
    description: Comma-separated list of additional tags to apply
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Pre-build steps
      if: inputs.build-task != ''
      shell: bash
      run: |
        mise run ${{ inputs.build-task }}

    - name: Generate tags
      id: tags
      shell: bash
      run: |
        SHA_TAG="${{ github.sha }}"
        BRANCH_TAG="${{ github.ref_name }}"
        LATEST_TAG="latest"
        REGISTRY="${{ inputs.registry }}"
        IMAGE="${{ inputs.app-name }}"

        TAGS="${REGISTRY}/${IMAGE}:${SHA_TAG},${REGISTRY}/${IMAGE}:${BRANCH_TAG},${REGISTRY}/${IMAGE}:${LATEST_TAG}"

        if [ -n "${{ inputs.additional-tags }}" ]; then
          IFS=',' read -ra ADD <<< "${{ inputs.additional-tags }}"
          for tag in "${ADD[@]}"; do
            TAGS="${TAGS},${REGISTRY}/${IMAGE}:${tag}"
          done
        fi

        echo "tags=${TAGS}" >> $GITHUB_OUTPUT

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.build-context }}
        file: ${{ inputs.dockerfile }}
        push: true
        tags: ${{ steps.tags.outputs.tags }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
