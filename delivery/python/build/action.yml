name: PyPI Build
description: Build a Python package wheel and upload it as an artifact

inputs:
  app-name:
    description: Application name; used in artifact names
    required: true
  pypi-package-dir:
    description: Directory containing built artifacts (relative to working-directory)
    required: false
    default: dist
  build-task:
    description: mise task that builds the package wheel
    required: false
    default: build
  working-directory:
    description: 'Working directory relative to repo root (default: repo root)'
    required: false
    default: .

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
      with:
        clean: false

    - uses: jdx/mise-action@v2

    - name: Build package
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        DEV_BUILD: ${{ github.event_name != 'workflow_dispatch' && github.run_number || '' }}
        RELEASE_VERSION: ${{ github.event.inputs.version || '' }}
      run: mise run ${{ inputs.build-task }}

    - uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.app-name }}-dist
        path: ${{ inputs.working-directory }}/${{ inputs.pypi-package-dir }}
