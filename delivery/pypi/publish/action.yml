name: PyPI Publish
description: Publish a built Python package to PyPI using Trusted Publishing (OIDC)

inputs:
  app-name:
    description: Application name; used in artifact names
    required: true
  pypi-package-dir:
    description: Directory containing built artifacts (relative to repo root)
    required: false
    default: dist

runs:
  using: composite
  steps:
    - uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.app-name }}-dist

    - uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: ${{ inputs.pypi-package-dir }}
