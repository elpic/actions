name: GitHub Release Publish
description: Download the build artifact and create a GitHub Release

inputs:
  app-name:
    description: Application name; used to download the correct artifact
    required: true
  build-output:
    description: Directory where the built artifact was extracted
    required: false
    default: dist
  draft:
    description: Create a draft release instead of publishing immediately
    required: false
    default: "false"
  tag-name:
    description: >
      Tag to create a release for (default: inferred from github.ref).
      Useful for testing or creating releases for specific tags.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.app-name }}-dist
        path: ${{ inputs.build-output }}
    - uses: softprops/action-gh-release@v3
      with:
        token: ${{ github.token }}
        files: ${{ inputs.build-output }}/*
        generate_release_notes: true
        draft: ${{ inputs.draft == 'true' }}
        tag_name: ${{ inputs.tag-name || github.ref }}
