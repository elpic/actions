# Integration checks for the actions repository itself.
# Validates structure, runs utility tests, and coordinates integration tests.

name: Integration

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'utilities/**'
      - 'delivery/**'
      - 'integration/**'
      - '.github/workflows/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Structural validation ─────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - name: Validate action.yml files
        shell: bash
        run: |
          errors=0
          while IFS= read -r -d '' f; do
            dir=$(dirname "$f")
            echo "Checking $f ..."
            # Must be valid YAML with a "runs" key
            if ! yq -e '.runs' "$f" >/dev/null 2>&1; then
              echo "  ERROR: missing 'runs' key"
              errors=$((errors + 1))
            fi
            # Must have a "name" key
            if ! yq -e '.name' "$f" >/dev/null 2>&1; then
              echo "  ERROR: missing 'name' key"
              errors=$((errors + 1))
            fi
            # Must have a "description" key
            if ! yq -e '.description' "$f" >/dev/null 2>&1; then
              echo "  ERROR: missing 'description' key"
              errors=$((errors + 1))
            fi
            # Must use composite
            using=$(yq '.runs.using' "$f")
            if [ "$using" != "composite" ]; then
              echo "  ERROR: runs.using must be 'composite', got '$using'"
              errors=$((errors + 1))
            fi
          done < <(find . -name 'action.yml' -not -path './.github/workflows/tests/*' -print0)

          if [ "$errors" -gt 0 ]; then
            echo "---"
            echo "Found $errors validation error(s)"
            exit 1
          fi
          echo "All action.yml files are valid."

      - name: Check every action has a README
        shell: bash
        run: |
          errors=0
          while IFS= read -r -d '' f; do
            dir=$(dirname "$f")
            if [ ! -f "$dir/README.md" ]; then
              echo "ERROR: $dir has action.yml but no README.md"
              errors=$((errors + 1))
            fi
          done < <(find . -name 'action.yml' -not -path './.github/workflows/tests/*' -print0)

          if [ "$errors" -gt 0 ]; then
            echo "Found $errors action(s) missing README.md"
            exit 1
          fi
          echo "All actions have a README.md."

  # ── Utility tests ────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      packages: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # ── Detect which files changed ─────────────────────────────────
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            oci_tags:
              - 'utilities/generate-oci-tags/**'
            setup_just:
              - 'utilities/setup-just/**'
            setup_mise:
              - 'utilities/setup-mise/**'
            docker_mirror:
              - 'utilities/docker-mirror/**'
            upsert_pr_comment:
              - 'utilities/upsert-pr-comment/**'
            update_major_tag:
              - 'utilities/update-major-tag/**'
            python_build:
              - 'delivery/python/build/**'
            github_release_build:
              - 'delivery/github-release/build/**'
            github_release_publish:
              - 'delivery/github-release/publish/**'
            tauri_setup:
              - 'integration/tauri/setup/**'
            tauri_build:
              - 'integration/tauri/build/**'

      # ── Generate OCI Tags ──────────────────────────────────────────
      - id: test_generate_oci_tags
        if: steps.filter.outputs.oci_tags == 'true'
        continue-on-error: true
        uses: ./.github/workflows/tests/utilities/test-generate-oci-tags

      # ── Setup Just ─────────────────────────────────────────────────
      - id: test_setup_just
        if: steps.filter.outputs.setup_just == 'true'
        continue-on-error: true
        uses: ./.github/workflows/tests/utilities/test-setup-just

      # ── Setup Mise ─────────────────────────────────────────────────
      - id: test_setup_mise
        if: steps.filter.outputs.setup_mise == 'true'
        continue-on-error: true
        uses: ./.github/workflows/tests/utilities/test-setup-mise

      # ── Mirror Docker Image ────────────────────────────────────────
      - id: test_docker_mirror
        if: steps.filter.outputs.docker_mirror == 'true'
        continue-on-error: true
        uses: ./.github/workflows/tests/utilities/test-docker-mirror

      # ── Upsert PR Comment (PR only) ────────────────────────────────
      - id: test_upsert_pr_comment
        if: steps.filter.outputs.upsert_pr_comment == 'true' && github.event_name == 'pull_request'
        continue-on-error: true
        uses: ./.github/workflows/tests/utilities/test-upsert-pr-comment

      # ── Update Major Tag ──────────────────────────────────────────
      - id: test_update_major_tag
        if: steps.filter.outputs.update_major_tag == 'true'
        continue-on-error: true
        uses: ./.github/workflows/tests/utilities/test-update-major-tag

      # ── Python Build ──────────────────────────────────────────────
      - id: test_python_build
        if: steps.filter.outputs.python_build == 'true'
        continue-on-error: true
        uses: ./.github/workflows/tests/delivery/test-python-build

      # ── GitHub Release Build ──────────────────────────────────────
      - id: test_github_release_build
        if: steps.filter.outputs.github_release_build == 'true'
        continue-on-error: true
        uses: ./.github/workflows/tests/delivery/test-github-release-build

      # ── GitHub Release Publish ────────────────────────────────────
      - id: test_github_release_publish
        if: steps.filter.outputs.github_release_publish == 'true'
        continue-on-error: true
        uses: ./.github/workflows/tests/delivery/test-github-release-publish

      # ── Tauri Setup ────────────────────────────────────────────────
      - id: test_tauri_setup
        if: steps.filter.outputs.tauri_setup == 'true'
        continue-on-error: true
        uses: ./.github/workflows/tests/integration/test-tauri-setup

      # ── Tauri Build ────────────────────────────────────────────────
      - id: test_tauri_build
        if: steps.filter.outputs.tauri_build == 'true'
        continue-on-error: true
        uses: ./.github/workflows/tests/integration/test-tauri-build

      # ── Report results ─────────────────────────────────────────────
      - name: Report results
        if: always()
        shell: bash
        run: |
          failed=0

          echo "=== Test Results ==="

          inspect() {
            local name="$1" outcome="$2"
            case "$outcome" in
              success) echo "  ✅ $name" ;;
              skipped) echo "  ⏭️  $name" ;;
              *)       echo "  ❌ $name"; failed=1 ;;
            esac
          }

          inspect "Generate OCI Tags"  "${{ steps.test_generate_oci_tags.outcome }}"
          inspect "Setup Just"         "${{ steps.test_setup_just.outcome }}"
          inspect "Setup Mise"         "${{ steps.test_setup_mise.outcome }}"
          inspect "Mirror Docker Image" "${{ steps.test_docker_mirror.outcome }}"

          inspect "Update Major Tag"   "${{ steps.test_update_major_tag.outcome }}"
          inspect "Python Build"       "${{ steps.test_python_build.outcome }}"
          inspect "GitHub Release Build" "${{ steps.test_github_release_build.outcome }}"
          inspect "GitHub Release Publish" "${{ steps.test_github_release_publish.outcome }}"

          inspect "Tauri Setup" "${{ steps.test_tauri_setup.outcome }}"
          inspect "Tauri Build" "${{ steps.test_tauri_build.outcome }}"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            inspect "Upsert PR Comment" "${{ steps.test_upsert_pr_comment.outcome }}"
          fi

          echo "==================="

          if [ "$failed" -eq 1 ]; then
            echo "❌ Some tests failed"
            exit 1
          fi
          echo "✅ All tests passed"
