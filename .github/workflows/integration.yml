# Integration checks for the actions repository itself.
# Validates structure, runs utility tests, and coordinates integration tests.

name: Integration

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Structural validation ─────────────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Validate action.yml files
        shell: bash
        run: |
          errors=0
          while IFS= read -r -d '' f; do
            dir=$(dirname "$f")
            echo "Checking $f ..."
            # Must be valid YAML with a "runs" key
            if ! yq -e '.runs' "$f" >/dev/null 2>&1; then
              echo "  ERROR: missing 'runs' key"
              errors=$((errors + 1))
            fi
            # Must have a "name" key
            if ! yq -e '.name' "$f" >/dev/null 2>&1; then
              echo "  ERROR: missing 'name' key"
              errors=$((errors + 1))
            fi
            # Must have a "description" key
            if ! yq -e '.description' "$f" >/dev/null 2>&1; then
              echo "  ERROR: missing 'description' key"
              errors=$((errors + 1))
            fi
            # Must use composite
            using=$(yq '.runs.using' "$f")
            if [ "$using" != "composite" ]; then
              echo "  ERROR: runs.using must be 'composite', got '$using'"
              errors=$((errors + 1))
            fi
          done < <(find . -name 'action.yml' -print0)

          if [ "$errors" -gt 0 ]; then
            echo "---"
            echo "Found $errors validation error(s)"
            exit 1
          fi
          echo "All action.yml files are valid."

      - name: Check every action has a README
        shell: bash
        run: |
          errors=0
          while IFS= read -r -d '' f; do
            dir=$(dirname "$f")
            if [ ! -f "$dir/README.md" ]; then
              echo "ERROR: $dir has action.yml but no README.md"
              errors=$((errors + 1))
            fi
          done < <(find . -name 'action.yml' -print0)

          if [ "$errors" -gt 0 ]; then
            echo "Found $errors action(s) missing README.md"
            exit 1
          fi
          echo "All actions have a README.md."

  # ── Utility: generate-oci-tags ───────────────────────────────────
  test-generate-oci-tags:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./tests/utilities/test-generate-oci-tags

  # ── Utility: setup-just ──────────────────────────────────────────
  test-setup-just:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./tests/utilities/test-setup-just

  # ── Utility: setup-mise ──────────────────────────────────────────
  test-setup-mise:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./tests/utilities/test-setup-mise

  # ── Utility: docker-mirror ───────────────────────────────────────
  test-docker-mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: ./tests/utilities/test-docker-mirror

  # ── Utility: upsert-pr-comment ───────────────────────────────────
  test-upsert-pr-comment:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
      pull-requests: write
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: ./tests/utilities/test-upsert-pr-comment
