name: Test Python Build
description: Calls the actual delivery/python/build action with a minimal fixture project.

runs:
  using: composite
  steps:
    - name: Create test fixture project
      shell: bash
      run: |
        FIXTURE=".test-fixtures/python-build"
        rm -rf "$FIXTURE"
        mkdir -p "$FIXTURE/src/test_package"

        # mise.toml — defines the build task the action will call
        cat > "$FIXTURE/mise.toml" << 'EOF'
        [tasks.build]
        run = "python -m build"
        EOF

        # pyproject.toml
        cat > "$FIXTURE/pyproject.toml" << 'EOF'
        [build-system]
        requires = ["setuptools>=68.0", "wheel"]
        build-backend = "setuptools.build_meta"

        [project]
        name = "test-package"
        version = "0.1.0"
        description = "A test package for CI validation"
        requires-python = ">=3.9"
        EOF

        cat > "$FIXTURE/src/test_package/__init__.py" << 'EOF'
        __version__ = "0.1.0"
        EOF

        cat > "$FIXTURE/setup.cfg" << 'EOF'
        [metadata]
        name = test-package
        version = 0.1.0

        [options]
        package_dir =
            = src
        packages = find:
        EOF

        echo "✅ Test fixture created at $FIXTURE"

    # Call the actual python/build action with working-directory pointing to our fixture
    - uses: ./delivery/python/build
      with:
        app-name: test-package
        working-directory: .test-fixtures/python-build

    - name: Verify build output
      shell: bash
      run: |
        WHEEL=$(ls .test-fixtures/python-build/dist/*.whl 2>/dev/null | head -1)
        if [ -z "$WHEEL" ]; then
          echo "FAIL: no .whl file found in .test-fixtures/python-build/dist/"
          ls -la .test-fixtures/python-build/dist/ 2>/dev/null || echo "  dist/ does not exist"
          exit 1
        fi
        echo "✅ python/build: wheel created → $(basename "$WHEEL")"

        # Verify the wheel can be installed
        pip install "$WHEEL" --quiet
        python -c "import test_package; v=test_package.__version__; assert v == '0.1.0', 'version mismatch: ' + v; print('✅ python/build: package installs and imports correctly')" || {
          echo "FAIL: package failed to install or import"
          exit 1
        }

    - name: Cleanup fixture
      if: always()
      shell: bash
      run: |
        rm -rf .test-fixtures
        echo "✅ Cleanup complete"
