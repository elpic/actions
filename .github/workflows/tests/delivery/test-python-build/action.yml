name: Test Python Build
description: Verifies that a Python package can be built using mise and python -m build.

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6

    - uses: jdx/mise-action@v2

    - name: Create minimal test project, build, and verify
      shell: bash
      run: |
        TMPDIR=$(mktemp -d)
        PROJECT="$TMPDIR/project"
        mkdir -p "$PROJECT/src/test_package"
        cd "$PROJECT"

        # ── Fixture: minimal Python project ────────────────────────────
        cat > pyproject.toml << 'EOF'
        [build-system]
        requires = ["setuptools>=68.0", "wheel"]
        build-backend = "setuptools.build_meta"

        [project]
        name = "test-package"
        version = "0.1.0"
        description = "A test package for CI validation"
        requires-python = ">=3.9"
        EOF

        cat > src/test_package/__init__.py << 'EOF'
        __version__ = "0.1.0"
        EOF

        cat > setup.cfg << 'EOF'
        [metadata]
        name = test-package
        version = 0.1.0

        [options]
        package_dir =
            = src
        packages = find:
        EOF

        # ── Build ──────────────────────────────────────────────────────
        pip install build --quiet
        python -m build --quiet

        WHEEL=$(ls dist/*.whl 2>/dev/null | head -1)
        SRCDIST=$(ls dist/*.tar.gz 2>/dev/null | head -1)

        if [ -z "$WHEEL" ]; then
          echo "FAIL: no .whl file was created"
          ls -la dist/ 2>/dev/null || echo "dist/ does not exist"
          exit 1
        fi
        echo "✅ python/build: wheel created → $(basename "$WHEEL")"
        echo "   source dist → $(basename "$SRCDIST")"

        # ── Verify installable ─────────────────────────────────────────
        pip install "$WHEEL" --quiet
        python -c "
import test_package
assert test_package.__version__ == '0.1.0', f'version mismatch: {test_package.__version__}'
print('✅ python/build: package installs and imports correctly')
" || {
          echo "FAIL: package failed to install or import"
          exit 1
        }
