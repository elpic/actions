name: Test GitHub Release Publish
description: Validates the artifact upload/download contract used by the publish action.

runs:
  using: composite
  steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    # ── Upload a test artifact (mimics what github-release/build does) ──
    - name: Create and upload test artifact
      shell: bash
      run: |
        TMPDIR=$(mktemp -d)
        mkdir -p "$TMPDIR/dist"

        # Create a pretend release artifact
        echo "#!/usr/bin/env bash" > "$TMPDIR/dist/test-app"
        echo 'echo "Hello from test-app v0.1.0"' >> "$TMPDIR/dist/test-app"
        chmod +x "$TMPDIR/dist/test-app"

        # Also add a checksum file
        sha256sum "$TMPDIR/dist/test-app" > "$TMPDIR/dist/test-app.sha256"

        echo "✅ Test artifact created:"
        ls -la "$TMPDIR/dist/"

        # Store the artifact content hash for later verification
        sha256sum "$TMPDIR/dist/test-app" | cut -d' ' -f1 > /tmp/test-artifact-hash
        echo "ARTIFACT_DIR=$TMPDIR/dist" >> "$GITHUB_ENV"

    - uses: actions/upload-artifact@v4
      with:
        name: test-app-dist
        path: ${{ env.ARTIFACT_DIR }}

    # ── Download the artifact (mimics the publish action) ──────────────
    - name: Download artifact (same pattern as github-release/publish)
      uses: actions/download-artifact@v4
      with:
        name: test-app-dist
        path: dist

    - name: Verify downloaded artifact
      shell: bash
      run: |
        EXPECTED_HASH=$(cat /tmp/test-artifact-hash)

        if [ ! -f "dist/test-app" ]; then
          echo "FAIL: dist/test-app not found after download"
          ls -la dist/ 2>/dev/null || echo "dist/ does not exist"
          exit 1
        fi

        ACTUAL_HASH=$(sha256sum dist/test-app | cut -d' ' -f1)
        if [ "$ACTUAL_HASH" != "$EXPECTED_HASH" ]; then
          echo "FAIL: artifact hash mismatch"
          echo "  expected: $EXPECTED_HASH"
          echo "  actual:   $ACTUAL_HASH"
          exit 1
        fi

        OUTPUT=$(bash dist/test-app)
        if [ "$OUTPUT" != "Hello from test-app v0.1.0" ]; then
          echo "FAIL: unexpected output: '$OUTPUT'"
          exit 1
        fi

        echo "✅ github-release/publish: artifact uploaded and downloaded correctly"
        echo "   dist/test-app is executable and produces expected output"
