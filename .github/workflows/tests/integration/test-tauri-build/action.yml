name: Test Tauri Build
description: "Verifies that the Tauri build action runs the full build pipeline"

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "22"

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable

    - name: Scaffold test Tauri project
      shell: bash
      run: bash .github/workflows/tests/integration/test-tauri-build/scaffold.sh

    - name: Run Tauri build
      uses: ./integration/tauri/build
      with:
        project-directory: .test-fixtures/tauri-build

    - name: Verify output
      shell: bash
      run: |
        FIXTURE=".test-fixtures/tauri-build"
        if [ ! -f "$FIXTURE/dist/index.html" ]; then
          echo "FAIL: frontend build did not produce dist/index.html"
          exit 1
        fi
        echo "✅ Tauri build: all steps completed successfully"
