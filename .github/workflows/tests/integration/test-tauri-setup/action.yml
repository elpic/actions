name: Test Tauri Setup
description: "Verifies that the Tauri setup action installs Node.js, Rust, and cargo correctly"

runs:
  using: composite
  steps:
    - uses: ./integration/tauri/setup
      with:
        node-version: "22"
        rust-version: stable

    - name: Verify Node.js
      shell: bash
      run: |
        echo "node version: $(node --version)"
        command -v node >/dev/null || { echo "FAIL: node not found"; exit 1; }
        echo "npm version: $(npm --version)"
        command -v npm >/dev/null || { echo "FAIL: npm not found"; exit 1; }

    - name: Verify Rust
      shell: bash
      run: |
        echo "rustc version: $(rustc --version)"
        command -v rustc >/dev/null || { echo "FAIL: rustc not found"; exit 1; }
        echo "cargo version: $(cargo --version)"
        command -v cargo >/dev/null || { echo "FAIL: cargo not found"; exit 1; }

    - name: Verify system deps (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        pkg-config --libs webkit2gtk-4.1 >/dev/null 2>&1 || { echo "FAIL: webkit2gtk not found"; exit 1; }
        pkg-config --libs gtk+-3.0 >/dev/null 2>&1 || { echo "FAIL: gtk+3.0 not found"; exit 1; }
        echo "✅ Tauri setup: Node.js, Rust, and system deps are installed"
