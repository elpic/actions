# Deploy the TanStack Start landing page to GitHub Pages.
# Builds with Bun, creates a static SPA shell, then deploys via the standard
# GitHub Pages actions.

name: Deploy static content to Pages

on:
  push:
    branches: ["pages"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  # Vite base path — must match the GitHub Pages URL subpath.
  # For user/org sites (username.github.io) this is empty.
  # For project sites (username.github.io/repo) this is /repo.
  BASE_PATH: /${{ github.event.repository.name }}

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static Pages site
        run: |
          rm -rf dist/pages
          ./node_modules/.bin/vite build \
            --config vite.pages.config.ts \
            --base=${{ env.BASE_PATH }}/ \
            --outDir dist/pages \
            --emptyOutDir
          mv dist/pages/pages.html dist/pages/index.html

      - name: Verify static Pages artifact
        run: |
          if [ ! -f dist/pages/index.html ]; then
            echo "ERROR: dist/pages/index.html was not generated"
            echo "Client output:"
            find dist/pages -maxdepth 3 -type f | sort | sed -n '1,120p'
            exit 1
          fi

          SIZE=$(wc -c < dist/pages/index.html)
          echo "Verified generated dist/pages/index.html ($SIZE bytes)"
          if [ "$SIZE" -lt 100 ]; then
            echo "ERROR: captured HTML is too small ($SIZE bytes)"
            head -5 dist/pages/index.html
            exit 1
          fi
          if grep -q "This page didn't load\|Something went wrong on our end" dist/pages/index.html; then
            echo "ERROR: generated fallback error page instead of the landing page shell"
            head -20 dist/pages/index.html
            exit 1
          fi
          if ! grep -q "elpic/actions - Reusable GitHub Actions" dist/pages/index.html; then
            echo "ERROR: generated HTML does not contain the expected page metadata"
            head -20 dist/pages/index.html
            exit 1
          fi
          if ! grep -q 'type="module"' dist/pages/index.html; then
            echo "ERROR: generated HTML does not load the client app bundle"
            head -20 dist/pages/index.html
            exit 1
          fi
          head -3 dist/pages/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/pages'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
