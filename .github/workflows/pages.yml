# Deploy the TanStack Start landing page to GitHub Pages.
# Builds with Bun, creates a static SPA shell, then deploys via the standard
# GitHub Pages actions.

name: Deploy static content to Pages

on:
  push:
    branches: ["pages"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  # Vite base path — must match the GitHub Pages URL subpath.
  # For user/org sites (username.github.io) this is empty.
  # For project sites (username.github.io/repo) this is /repo.
  BASE_PATH: /${{ github.event.repository.name }}

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build with base path
        run: bun run build -- --base=${{ env.BASE_PATH }}/

      - name: Create static Pages shell
        run: |
          ASSET_BASE="${BASE_PATH%/}/assets"
          ENTRY_JS=$(grep -rl "hydrateRoot(document" dist/client/assets/*.js | head -n 1)
          STYLES_CSS=$(find dist/client/assets -maxdepth 1 -name 'styles-*.css' | head -n 1)

          if [ -z "$ENTRY_JS" ] || [ ! -f "$ENTRY_JS" ]; then
            echo "ERROR: could not find the client entry bundle"
            find dist/client/assets -maxdepth 1 -type f | sort
            exit 1
          fi

          if [ -z "$STYLES_CSS" ] || [ ! -f "$STYLES_CSS" ]; then
            echo "ERROR: could not find the stylesheet bundle"
            find dist/client/assets -maxdepth 1 -type f | sort
            exit 1
          fi

          ENTRY_JS="${ASSET_BASE}/$(basename "$ENTRY_JS")"
          STYLES_CSS="${ASSET_BASE}/$(basename "$STYLES_CSS")"

          cat > dist/client/index.html <<HTML
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>elpic/actions - Reusable GitHub Actions for integration &amp; delivery</title>
              <meta name="author" content="elpic" />
              <meta name="robots" content="index, follow" />
              <meta name="description" content="A curated collection of composite GitHub Actions for integration, delivery, and repo utilities. Drop-in steps for Go, Python, and PyPI pipelines." />
              <meta property="og:site_name" content="elpic/actions" />
              <meta property="og:title" content="elpic/actions - Reusable GitHub Actions" />
              <meta property="og:description" content="Composite GitHub Actions for integration, release, and delivery. Reference them from your workflow in a single line." />
              <meta property="og:type" content="website" />
              <meta property="og:url" content="https://elpic.github.io/actions/" />
              <meta name="twitter:card" content="summary_large_image" />
              <meta name="twitter:title" content="elpic/actions - Reusable GitHub Actions" />
              <meta name="twitter:description" content="Composite GitHub Actions for integration, release, and delivery." />
              <link rel="canonical" href="https://elpic.github.io/actions/" />
              <link rel="stylesheet" href="$STYLES_CSS" />
              <script type="module" src="$ENTRY_JS"></script>
            </head>
            <body></body>
          </html>
          HTML

      - name: Verify static Pages artifact
        run: |
          if [ ! -f dist/client/index.html ]; then
            echo "ERROR: dist/client/index.html was not generated"
            echo "Client output:"
            find dist/client -maxdepth 3 -type f | sort | sed -n '1,120p'
            exit 1
          fi

          SIZE=$(wc -c < dist/client/index.html)
          echo "Verified prerendered dist/client/index.html ($SIZE bytes)"
          if [ "$SIZE" -lt 100 ]; then
            echo "ERROR: captured HTML is too small ($SIZE bytes)"
            head -5 dist/client/index.html
            exit 1
          fi
          if grep -q "This page didn't load\|Something went wrong on our end" dist/client/index.html; then
            echo "ERROR: generated fallback error page instead of the landing page shell"
            head -20 dist/client/index.html
            exit 1
          fi
          if ! grep -q "elpic/actions - Reusable GitHub Actions" dist/client/index.html; then
            echo "ERROR: generated HTML does not contain the expected page metadata"
            head -20 dist/client/index.html
            exit 1
          fi
          if ! grep -q 'type="module"' dist/client/index.html; then
            echo "ERROR: generated HTML does not load the client app bundle"
            head -20 dist/client/index.html
            exit 1
          fi
          head -3 dist/client/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/client'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
