# Build workflow for the pages branch (GitHub Pages site).
# On push to main, checks out the pages source, builds with Bun,
# and opens a PR against the pages branch with the updated dist.

name: Pages Build

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout pages branch
        uses: actions/checkout@v4
        with:
          ref: pages
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Prepare build output
        run: |
          # Temporarily track dist/ for the build commit
          echo '!dist' >> .gitignore

      - name: Commit and push build branch
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="pages-build/${{ github.run_id }}"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

          git checkout -b "$BRANCH"
          git add dist/ .gitignore
          git commit -m "build: update pages dist from main@${{ github.sha }}"

          git push origin "$BRANCH"

      - name: Create pull request against pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_URL=$(gh pr create \
            --repo ${{ github.repository }} \
            --base pages \
            --head "${{ steps.commit.outputs.branch }}" \
            --title "build: update pages dist from main@${{ github.sha }}" \
            --body "Automated build of the pages site triggered by commit [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }}) on \`main\`.

          Review the built output and squash-merge to deploy to GitHub Pages.")

          echo "PR created: $PR_URL"
