# Deploy the TanStack Start landing page to GitHub Pages.
# Builds with Bun, creates a static SPA shell, then deploys via the standard
# GitHub Pages actions.

name: Deploy static content to Pages

on:
  push:
    branches: ["pages"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  # Vite base path — must match the GitHub Pages URL subpath.
  # For user/org sites (username.github.io) this is empty.
  # For project sites (username.github.io/repo) this is /repo.
  BASE_PATH: /${{ github.event.repository.name }}

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static Pages site
        run: |
          rm -rf dist/pages
          ./node_modules/.bin/vite build \
            --base=${{ env.BASE_PATH }}/ \
            --outDir dist/pages \
            --emptyOutDir \
            src/pages-entry.tsx

          cat > dist/pages/index.html <<HTML
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>elpic/actions - Reusable GitHub Actions for integration &amp; delivery</title>
              <meta name="author" content="elpic" />
              <meta name="robots" content="index, follow" />
              <meta name="description" content="A curated collection of composite GitHub Actions for integration, delivery, and repo utilities. Drop-in steps for Go, Python, and PyPI pipelines." />
              <meta property="og:site_name" content="elpic/actions" />
              <meta property="og:title" content="elpic/actions - Reusable GitHub Actions" />
              <meta property="og:description" content="Composite GitHub Actions for integration, release, and delivery. Reference them from your workflow in a single line." />
              <meta property="og:type" content="website" />
              <meta property="og:url" content="https://elpic.github.io/actions/" />
              <meta name="twitter:card" content="summary_large_image" />
              <meta name="twitter:title" content="elpic/actions - Reusable GitHub Actions" />
              <meta name="twitter:description" content="Composite GitHub Actions for integration, release, and delivery." />
              <link rel="canonical" href="https://elpic.github.io/actions/" />
            </head>
            <body>
              <div id="root"></div>
              <script type="module" src="${BASE_PATH%/}/assets/pages-entry.js"></script>
            </body>
          </html>
          HTML

      - name: Verify static Pages artifact
        run: |
          if [ ! -f dist/pages/index.html ]; then
            echo "ERROR: dist/pages/index.html was not generated"
            echo "Client output:"
            find dist/pages -maxdepth 3 -type f | sort | sed -n '1,120p'
            exit 1
          fi

          SIZE=$(wc -c < dist/pages/index.html)
          echo "Verified generated dist/pages/index.html ($SIZE bytes)"
          if [ "$SIZE" -lt 100 ]; then
            echo "ERROR: captured HTML is too small ($SIZE bytes)"
            head -5 dist/pages/index.html
            exit 1
          fi
          if grep -q "This page didn't load\|Something went wrong on our end" dist/pages/index.html; then
            echo "ERROR: generated fallback error page instead of the landing page shell"
            head -20 dist/pages/index.html
            exit 1
          fi
          if ! grep -q "elpic/actions - Reusable GitHub Actions" dist/pages/index.html; then
            echo "ERROR: generated HTML does not contain the expected page metadata"
            head -20 dist/pages/index.html
            exit 1
          fi
          if ! grep -q 'type="module"' dist/pages/index.html; then
            echo "ERROR: generated HTML does not load the client app bundle"
            head -20 dist/pages/index.html
            exit 1
          fi
          head -3 dist/pages/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/pages'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
