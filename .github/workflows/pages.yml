# Deploy the TanStack Start landing page to GitHub Pages.
# Builds with Bun, generates a static index.html for the SPA client bundle,
# then deploys via the standard GitHub Pages actions.

name: Deploy static content to Pages

on:
  push:
    branches: ["pages"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Generate index.html
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          const assetsDir = 'dist/client/assets';
          const files = fs.readdirSync(assetsDir);

          const css = files.find(f => f.endsWith('.css')) || '';
          const jsFiles = files.filter(f => f.startsWith('index-') && f.endsWith('.js'));
          const js = jsFiles.sort((a, b) =>
            fs.statSync(path.join(assetsDir, a)).size - fs.statSync(path.join(assetsDir, b)).size
          )[0];

          if (!js) {
            console.error('ERROR: no index-*.js found in', assetsDir);
            process.exit(1);
          }

          const html = [
            '<!DOCTYPE html>',
            '<html lang=\"en\">',
            '<head>',
            '  <meta charset=\"utf-8\" />',
            '  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\" />',
            '  <meta name=\"description\" content=\"elpic/actions - Reusable GitHub Actions, integration and delivery composite workflow templates\" />',
            '  <meta property=\"og:title\" content=\"elpic/actions - Reusable GitHub Actions\" />',
            '  <meta property=\"og:description\" content=\"Composite GitHub Actions for integration, release, and delivery.\" />',
            '  <meta property=\"og:type\" content=\"website\" />',
            '  <title>elpic/actions - Reusable GitHub Actions</title>',
            css ? '  <link rel=\"stylesheet\" href=\"/assets/' + css + '\" />' : '',
            '</head>',
            '<body>',
            '  <div id=\"root\"></div>',
            '  <script type=\"module\" src=\"/assets/' + js + '\"></script>',
            '</body>',
            '</html>'
          ].filter(Boolean).join('\n');

          fs.writeFileSync('dist/client/index.html', html);
          console.log('Generated dist/client/index.html');
          console.log('  CSS:', css || '(none)');
          console.log('  JS:', js);
          "

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/client'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
