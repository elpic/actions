# Deploy the TanStack Start landing page to Cloudflare Pages.
# Builds with Bun, then publishes via Wrangler.
# Trigger: push to pages branch, or manual workflow_dispatch.

name: Deploy to Cloudflare Pages

on:
  push:
    branches: ["pages"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy dist --project-name=elpic-actions
