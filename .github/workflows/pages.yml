# Deploy the TanStack Start landing page to GitHub Pages.
# Builds with Bun, generates a static index.html for the SPA client bundle,
# then deploys via the standard GitHub Pages actions.

name: Deploy static content to Pages

on:
  push:
    branches: ["pages"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Capture SSR-rendered HTML
        run: |
          # Start the built Worker locally via the dist/server/wrangler.json
          # (already configured with main: index.js and assets.directory: ../client).
          # Run from project root so node_modules are resolvable.
          npx wrangler dev \
            --config dist/server/wrangler.json \
            --port 8788 --ip localhost --inspector-port 0 &
          WRANGLER_PID=$!

          # Wait for the server to be ready
          for i in $(seq 1 30); do
            if curl -s -o /dev/null http://localhost:8788 2>/dev/null; then
              break
            fi
            sleep 1
          done

          # Capture the real SSR-rendered HTML
          curl -s http://localhost:8788 > dist/client/index.html
          kill $WRANGLER_PID 2>/dev/null || true
          wait $WRANGLER_PID 2>/dev/null || true

          echo "Captured dist/client/index.html ($(wc -c < dist/client/index.html) bytes)"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/client'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
