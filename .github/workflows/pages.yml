# Deploy the TanStack Start landing page to GitHub Pages.
# Builds with Bun, verifies the prerendered static HTML, then deploys via the
# standard GitHub Pages actions.

name: Deploy static content to Pages

on:
  push:
    branches: ["pages"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  # Vite base path — must match the GitHub Pages URL subpath.
  # For user/org sites (username.github.io) this is empty.
  # For project sites (username.github.io/repo) this is /repo.
  BASE_PATH: /${{ github.event.repository.name }}

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build with base path
        run: bun run build -- --base=${{ env.BASE_PATH }}/

      - name: Verify static Pages artifact
        run: |
          if [ ! -f dist/client/index.html ]; then
            echo "ERROR: dist/client/index.html was not prerendered"
            echo "Client output:"
            find dist/client -maxdepth 3 -type f | sort | sed -n '1,120p'
            exit 1
          fi

          SIZE=$(wc -c < dist/client/index.html)
          echo "Verified prerendered dist/client/index.html ($SIZE bytes)"
          if [ "$SIZE" -lt 100 ]; then
            echo "ERROR: captured HTML is too small ($SIZE bytes)"
            head -5 dist/client/index.html
            exit 1
          fi
          if grep -q "This page didn't load\|Something went wrong on our end" dist/client/index.html; then
            echo "ERROR: captured fallback error page instead of the landing page"
            head -20 dist/client/index.html
            exit 1
          fi
          if ! grep -q "Reusable GitHub Actions" dist/client/index.html; then
            echo "ERROR: captured HTML does not contain the expected landing page content"
            head -20 dist/client/index.html
            exit 1
          fi
          head -3 dist/client/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/client'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
