# Deploy the TanStack Start landing page to GitHub Pages.
# Builds with Bun, generates a static index.html for the SPA client bundle,
# then deploys via the standard GitHub Pages actions.

name: Deploy static content to Pages

on:
  push:
    branches: ["pages"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Generate index.html
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          const assets = fs.readdirSync('dist/client/assets');

          // Pick the first CSS and sort JS files by size (smallest = entry point)
          const css = assets.find(f => f.endsWith('.css'));
          const js = assets
            .filter(f => f.startsWith('index-') && f.endsWith('.js'))
            .sort((a, b) => fs.statSync('dist/client/assets/' + a).size
                           - fs.statSync('dist/client/assets/' + b).size)[0];

          if (!js) { console.error('no index-*.js found'); process.exit(1); }

          const h = [
            '<!DOCTYPE html>',
            '<html lang=\"en\">',
            '<head>',
            '  <meta charset=\"utf-8\" />',
            '  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\" />',
            css ? '  <link rel=\"stylesheet\" href=\"/assets/' + css + '\" />' : '',
            '</head>',
            '<body>',
            '  <div id=\"root\"></div>',
            '  <script type=\"module\" src=\"/assets/' + js + '\"></script>',
            '</body>',
            '</html>',
          ].filter(Boolean).join('\n');

          fs.writeFileSync('dist/client/index.html', h);
          const size = fs.statSync('dist/client/index.html').size;
          console.log('Generated dist/client/index.html (' + size + ' bytes, JS=' + js + (css ? ', CSS=' + css : '') + ')');
          "

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/client'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
